<!DOCTYPE html>
<html lang="en">

<head>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        #switch {
            border: 2px solid black;
            background-color: whitesmoke;
            height: 64px;
            width: 128px;
            font-size: larger;
        }
        main {
            gap: 0;
            margin: 0;
            padding: 0;
            padding: auto;
            border: 1px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 200vh;
        }

        #title {
            border-radius: 4px;
            border: 2px solid black;
            color: black;
            height: 64px;
            width: 512px;
            text-align: center;
        }

        #in,
        #out {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        #input-text,
        #output-text {
            width: 80%;
            height: 60%;
            font-size: x-large;
            box-sizing: border-box;
            border: 2px solid black;
            box-shadow: 0px 2px 4px black;
            border-radius: 4px;
            white-space: pre-line
        }
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SharpStyle</title>
</head>

<body>
    <h1 id="title">シャープ書式 | Sharp Style</h1>
    <button id="switch">#1 → あ</button>
    <main>
        <div id="in">
            <h2>入力 | Input</h2>
            <textarea id="input-text"></textarea>
        </div>
        <div id="out">
            <h2>出力 | Output</h2>
            <textarea readonly id="output-text"></textarea>
        </div>
    </main>
    <script type="module">
        import shrp from 'https://esm.sh/sharp-style';

        const $ = (name) => document.getElementById(name);
        const inputText = $("input-text");
        const outputText = $("output-text");
        let A = true;

        inputText.addEventListener("input", () => {
            outputText.textContent = A ? shrp.stringify(inputText.value).string : shrp.parse(inputText.value).string;
        })
        const button = $("switch");
        button.addEventListener("click", () => {
            if (A) button.textContent = "あ → #1"
            else button.textContent = "#1 → あ"
            A = !A
            outputText.textContent = A ? shrp.stringify(inputText.value).string : shrp.parse(inputText.value).string;
        })
    </script>
</body>

</html>
